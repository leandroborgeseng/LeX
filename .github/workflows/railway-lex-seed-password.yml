# Define LEX_SEED_PASSWORD no Railway a partir de um GitHub Secret (sem commitar a senha).
# Opcionalmente corre `prisma db seed` no container para atualizar o hash na BD (útil se a base já existia).
name: Railway — LEX_SEED_PASSWORD

on:
  workflow_dispatch:
    inputs:
      run_prisma_seed:
        description: 'Correr prisma db seed no container (atualiza a senha do utilizador seed na BD)'
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
      RAILWAY_ENV: ${{ secrets.RAILWAY_ENVIRONMENT }}
    steps:
      - name: Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: Gravar LEX_SEED_PASSWORD no Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          LEX_SEED_PASSWORD: ${{ secrets.LEX_SEED_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${RAILWAY_SERVICE_ID:-}" || { echo "Falta o secret RAILWAY_SERVICE_ID." >&2; exit 1; }
          ENV_NAME="${RAILWAY_ENV:-production}"
          printf '%s' "$LEX_SEED_PASSWORD" | railway variable set LEX_SEED_PASSWORD --stdin \
            --service "$RAILWAY_SERVICE_ID" \
            -e "$ENV_NAME" \
            --skip-deploys \
            -y

      - name: Atualizar senha na base (prisma db seed)
        if: github.event.inputs.run_prisma_seed == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          LEX_SEED_PASSWORD: ${{ secrets.LEX_SEED_PASSWORD }}
        run: |
          set -euo pipefail
          ENV_NAME="${RAILWAY_ENV:-production}"
          railway ssh --service "$RAILWAY_SERVICE_ID" -e "$ENV_NAME" -- \
            sh -c 'cd /app/apps/api && LEX_ALLOW_SEED_IN_PROD=1 LEX_SEED_PASSWORD="$0" npx prisma db seed --schema=prisma/schema.prisma' \
            "$LEX_SEED_PASSWORD"
